<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localisa</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div>
                    <div class="logo">Localisa</div>
                    <div class="version">v0.1.0</div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" data-panel="chat" onclick="app.switchPanel('chat')">
                    <span>&#128172;</span>
                    <span data-i18n="chat">Chat</span>
                </div>
                <div class="nav-item" data-panel="documents" onclick="app.switchPanel('documents')">
                    <span>&#128196;</span>
                    <span data-i18n="documents">Documentos</span>
                </div>
                <div class="nav-item" data-panel="health" onclick="app.switchPanel('health')">
                <div class="nav-item" data-panel="settings" onclick="app.switchPanel('settings')">
                    <span>&#9881;</span>
                    <span data-i18n="settings">Ajustes</span>
                </div>
                    <span>&#9889;</span>
                    <span data-i18n="health">Estado</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <span id="statusDot" class="status-dot"></span>
                <span id="modelInfo" style="margin-left:6px">--</span>
            </div>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="main-header">
                <h2 id="panelTitle" data-i18n="chat">Chat</h2>
                <div class="header-actions">
                    <button onclick="app.newChat()" data-i18n="new_chat">Nueva conversacion</button>
                </div>
            </header>

            <!-- Chat Panel -->
            <div id="panel-chat" class="panel active">
                <div class="chat-container" id="chatMessages"></div>

                <div class="typing-indicator" id="typing">
                    <span data-i18n="thinking">Pensando</span>
                    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="chatInput" rows="1" data-i18n="placeholder" placeholder="Escribe un mensaje..."></textarea>
                        <button class="btn-voice" id="btnVoice" onclick="voice.toggle()" title="Voz">
                            &#127908;
                        </button>
                        <button class="btn-send" id="btnSend" title="Enviar">
                            &#9654;
                        </button>
                    </div>
                </div>
            </div>

            <!-- Documents Panel -->
            <div id="panel-documents" class="panel">
                <div class="panel-content">
                    <div class="dropzone" id="dropzone">
                        <div class="dropzone-icon">&#128196;</div>
                        <div data-i18n="dropzone_text">Arrastra archivos aqui o haz clic para subir</div>
                        <div style="font-size:0.8em;color:var(--text-muted);margin-top:4px" data-i18n="dropzone_formats">PDF, DOCX, TXT, XLSX</div>
                    </div>
                    <input type="file" id="fileInput" style="display:none" accept=".pdf,.docx,.txt,.xlsx,.csv,.md">
                    <div id="uploadStatus" style="margin-bottom:16px;font-size:0.85em"></div>
                    <div id="docList"></div>
                </div>
            </div>

            <!-- Settings Panel -->
            <div id="panel-settings" class="panel">
                <div class="panel-content" id="settingsContent">
                    <p style="color:var(--text-muted)">Loading...</p>
                </div>
            </div>

            <!-- Health Panel -->
            <div id="panel-health" class="panel">
                <div class="panel-content">
                    <div id="healthGrid" class="health-grid">
                        <p style="color:var(--text-muted)">Cargando...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/documents.js"></script>
    <script src="/js/voice.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
